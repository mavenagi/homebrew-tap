name: Publish Version
on:
  repository_dispatch:
    types: [publish]

# Serialize publishes. Two dispatch events arriving close together (e.g., from
# back-to-back highlander releases) would otherwise both try to update the
# formula and push concurrently — the second push fails non-fast-forward,
# causing a flaky workflow failure. cancel-in-progress is false so an
# in-flight publish always finishes before the next one starts.
concurrency:
  group: homebrew-tap-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Configure git identity
        run: |
          git config --global user.name "Maven AGI"
          git config --global user.email "info@mavenagi.com"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: mavenagi/homebrew-tap
          ref: main
          token: ${{ secrets.MAGI_CLI_PUBLISH_TOKEN }}

      # Defense-in-depth: refuse dispatches that would downgrade the formula.
      # Highlander's release workflow already enforces semver-greater before
      # publishing, but a manual `gh api dispatches` call or a workflow bug
      # could still send us a stale or lower version. Catch it here too.
      - name: Verify incoming version is greater than current formula
        env:
          INCOMING: ${{ github.event.client_payload.version }}
        run: |
          CURRENT=$(grep -oE 'magi-v[0-9]+\.[0-9]+\.[0-9]+' Formula/magi.rb | head -1 | sed 's/^magi-v//')
          if [[ -z "$CURRENT" ]]; then
            echo "No current version detected in formula — accepting first publish ${INCOMING}."
            exit 0
          fi
          HIGHEST=$(printf '%s\n%s\n' "$CURRENT" "$INCOMING" | sort -V | tail -1)
          if [[ "$HIGHEST" != "$INCOMING" || "$INCOMING" == "$CURRENT" ]]; then
            echo "::error::Incoming version ${INCOMING} is not greater than current formula ${CURRENT}. Refusing to publish a downgrade."
            exit 1
          fi
          echo "Incoming ${INCOMING} > current ${CURRENT}. Proceeding."

      - name: Update version and sha in formula
        uses: ./.github/actions/update
        with:
          version: ${{ github.event.client_payload.version }}
          sha256: ${{ github.event.client_payload.sha }}

      - name: Commit, tag, and push
        uses: ./.github/actions/merge
        with:
          version: ${{ github.event.client_payload.version }}
