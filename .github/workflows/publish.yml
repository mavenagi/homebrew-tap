name: Publish Version
on:
  repository_dispatch:
    types: [publish]

concurrency:
  group: homebrew-tap-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Configure git identity
        run: |
          git config --global user.name "Maven AGI"
          git config --global user.email "info@mavenagi.com"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: mavenagi/homebrew-tap
          ref: main
          token: ${{ secrets.MAGI_CLI_PUBLISH_TOKEN }}

      - name: Verify incoming version is greater than current formula
        env:
          INCOMING: ${{ github.event.client_payload.version }}
        run: |
          set -euo pipefail

          if ! npx --yes semver@7 "$INCOMING" >/dev/null 2>&1; then
            echo "::error::Incoming version '${INCOMING}' is not a valid semver."
            exit 1
          fi

          # `|| true` — grep exits 1 on no-match under set -e.
          CURRENT=$(grep -oE 'releases/download/magi-v[^/]+' Formula/magi.rb | head -1 | sed 's|.*magi-v||' || true)
          if [[ -z "$CURRENT" ]]; then
            echo "No current version in formula — accepting first publish ${INCOMING}."
            exit 0
          fi

          if ! npx --yes semver@7 "$CURRENT" >/dev/null 2>&1; then
            echo "::error::Current formula version '${CURRENT}' is not a valid semver. Formula may be corrupted."
            exit 1
          fi

          # --include-prerelease — semver's default excludes prereleases from non-prerelease ranges.
          if ! npx --yes semver@7 --include-prerelease --range ">$CURRENT" "$INCOMING" >/dev/null 2>&1; then
            echo "::error::Incoming ${INCOMING} is not greater than current formula ${CURRENT}. Refusing downgrade."
            exit 1
          fi
          echo "Incoming ${INCOMING} > current ${CURRENT}. Proceeding."

      - name: Update version and sha in formula
        uses: ./.github/actions/update
        with:
          version: ${{ github.event.client_payload.version }}
          sha256: ${{ github.event.client_payload.sha }}

      - name: Commit, tag, and push
        uses: ./.github/actions/merge
        with:
          version: ${{ github.event.client_payload.version }}
